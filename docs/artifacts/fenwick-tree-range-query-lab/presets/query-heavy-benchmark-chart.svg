<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="760" viewBox="0 0 1040 760" role="img" aria-labelledby="title desc">
<title id="title">Fenwick vs Segment Tree benchmark chart</title>
<desc id="desc">Benchmark summary comparing RangeFenwick and a lazy segment tree, including throughput and average operation latencies.</desc>
<style>
text { font-family: Inter, Arial, sans-serif; fill: #0f172a; }
.muted { fill: #475569; }
.subtle { fill: #64748b; }
.title { font-size: 26px; font-weight: 700; }
.section { font-size: 16px; font-weight: 700; }
.label { font-size: 13px; font-weight: 600; }
.body { font-size: 13px; }
.small { font-size: 12px; }
.value { font-size: 28px; font-weight: 700; }
.card { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 1; }
.panel { fill: #ffffff; stroke: #dbe3ee; stroke-width: 1; }
.grid { stroke: #e2e8f0; stroke-width: 1; }
</style>
