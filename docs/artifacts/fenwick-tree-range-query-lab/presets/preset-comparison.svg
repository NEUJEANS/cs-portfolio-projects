<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="720" viewBox="0 0 1180 720" role="img" aria-labelledby="title desc">
<title id="title">Fenwick preset comparison dashboard</title>
<desc id="desc">A multi-preset benchmark dashboard comparing RangeFenwick and a lazy segment tree across balanced, query-heavy, update-heavy, and point-set-heavy workloads.</desc>
<style>
text { font-family: Inter, Arial, sans-serif; fill: #0f172a; }
.muted { fill: #475569; }
.subtle { fill: #64748b; }
.title { font-size: 28px; font-weight: 700; }
.section { font-size: 16px; font-weight: 700; }
.label { font-size: 13px; font-weight: 600; }
.body { font-size: 13px; }
.small { font-size: 12px; }
.value { font-size: 26px; font-weight: 700; }
.card { fill: #ffffff; stroke: #dbe3ee; stroke-width: 1; }
.panel { fill: #ffffff; stroke: #dbe3ee; stroke-width: 1; }
</style>
<rect width="100%" height="100%" fill="#f8fafc" />
<text class="title" x="40" y="50">Fenwick workload preset comparison</text>
<text class="body muted" x="40" y="76">Size 256 • 1000 operations/run • 3 repeats • seed 7 • average speedup 1.469x</text>
<rect class="card" x="40" y="102" width="260" height="92" rx="16" />
<text class="small subtle" x="58" y="128">Compared presets</text>
<text class="value" x="58" y="162">4</text>
<text class="small muted" x="58" y="182">balanced, query-heavy, update-heavy, point-set-heavy</text>
<rect class="card" x="316" y="102" width="260" height="92" rx="16" />
<text class="small subtle" x="334" y="128">Strongest edge</text>
<text class="value" x="334" y="162">update-heavy</text>
<text class="small muted" x="334" y="182">1.593x with range add dominance</text>
<rect class="card" x="592" y="102" width="260" height="92" rx="16" />
<text class="small subtle" x="610" y="128">Tightest race</text>
<text class="value" x="610" y="162">point-set-heavy</text>
<text class="small muted" x="610" y="182">1.102x speedup</text>
<rect class="card" x="868" y="102" width="260" height="92" rx="16" />
<text class="small subtle" x="886" y="128">Fastest Fenwick preset</text>
<text class="value" x="886" y="162">query-heavy</text>
<text class="small muted" x="886" y="182">447145.53 ops/sec</text>
<rect class="panel" x="40" y="222" width="500" height="360" rx="18" />
<text class="section" x="64" y="252">Speedup by preset</text>
<text class="small muted" x="64" y="272">Longer bars show where RangeFenwick gains more relative distance over the segment tree baseline.</text>
<rect class="panel" x="580" y="222" width="560" height="360" rx="18" />
<text class="section" x="604" y="252">Throughput by preset</text>
<text class="small muted" x="604" y="272">Each row keeps the same workload settings but swaps the preset mix.</text>
