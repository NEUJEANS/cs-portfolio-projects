<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1180" viewBox="0 0 1200 1180" role="img" aria-labelledby="title desc">
  <title id="title">Coordinator crash after durable ABORT peer termination timeline</title>
  <desc id="desc">Inventory and billing vote YES, but risk votes NO. The coordinator durably logs ABORT and crashes before the prepared YES-voters hear the decision. They are blocked in classic 2PC, but a peer-to-peer termination check can still prove ABORT safely because risk never reached PREPARED.</desc>
  <defs>
    <style>
      .title { font: 700 30px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .subtitle { font: 400 15px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #334155; }
      .summary-label { font: 600 12px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; text-transform: uppercase; letter-spacing: 0.08em; fill: #475569; }
      .summary-value { font: 700 22px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .summary-help { font: 400 12px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .step-label { font: 600 12px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; text-transform: uppercase; letter-spacing: 0.08em; fill: #475569; }
      .step-title { font: 700 20px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .step-body { font: 400 14px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #334155; }
      .step-footer { font: 600 13px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .step-number { font: 700 14px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: white; text-anchor: middle; dominant-baseline: middle; }
      .takeaway-label { font: 700 14px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .takeaway-text { font: 400 13px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #334155; }
    </style>
  </defs>
  <rect width="100%" height="100%" fill="#f8fafc" rx="28" ry="28" />
  <text class="title" x="48" y="54">Coordinator crash after durable ABORT — peer termination timeline</text>
  <text class="subtitle" x="48" y="84">transaction order-6112 • baseline blocked • peer resolution abort</text>
  <text class="subtitle" x="48" y="110">Inventory and billing vote YES, but risk votes NO. The coordinator durably logs ABORT and crashes before the prepared YES-voters hear the decision. They are blocked in classic 2PC, but a peer-to-peer termination check can still prove ABORT safely because risk never reached PREPARED.</text>
  <rect x="48" y="132" width="344" height="80" rx="18" ry="18" fill="#fff7ed" stroke="#ea580c" stroke-width="2" />
  <text class="summary-label" x="68" y="158">Baseline</text>
  <text class="summary-value" x="68" y="184">BLOCKED</text>
  <text class="summary-help" x="68" y="202">Hint: ABORT safe via risk</text>
  <rect x="404" y="132" width="344" height="80" rx="18" ry="18" fill="#fef2f2" stroke="#dc2626" stroke-width="2" />
  <text class="summary-label" x="424" y="158">Resolved decision</text>
  <text class="summary-value" x="424" y="184">ABORT</text>
  <text class="summary-help" x="424" y="202">Outcome: abort</text>
  <rect x="760" y="132" width="344" height="80" rx="18" ry="18" fill="#ecfdf5" stroke="#16a34a" stroke-width="2" />
  <text class="summary-label" x="780" y="158">Unresolved after peer exchange</text>
  <text class="summary-value" x="780" y="184">none</text>
  <text class="summary-help" x="780" y="202">Participants still waiting: 0</text>
  <line x1="110" y1="210" x2="110" y2="878" stroke="#cbd5e1" stroke-width="6" stroke-linecap="round" />
  <circle cx="110" cy="210" r="20" fill="#ea580c" />
  <text class="step-number" x="110" y="210">1</text>
  <rect x="160" y="186" width="992" height="182" rx="22" ry="22" fill="#fff7ed" stroke="#ea580c" stroke-width="2" />
  <text class="step-label" x="184" y="216">Step 1</text>
  <text class="step-title" x="184" y="244">Baseline incident state</text>
  <text class="step-body" x="184" y="276">The baseline 2PC run ends as blocked. Durable decision: ABORT. Termination</text>
  <text class="step-body" x="184" y="298">hint: ABORT safe via risk. Unresolved after the plain run: inventory and</text>
  <text class="step-body" x="184" y="320">billing.</text>
  <text class="step-footer" x="184" y="350">Peer-assisted termination starts from these exact facts; it never invents a</text>
  <text class="step-footer" x="184" y="370">brand-new global outcome.</text>
  <circle cx="110" cy="414" r="20" fill="#dc2626" />
  <text class="step-number" x="110" y="414">2</text>
  <rect x="160" y="390" width="992" height="140" rx="22" ry="22" fill="#fef2f2" stroke="#dc2626" stroke-width="2" />
  <text class="step-label" x="184" y="420">Step 2</text>
  <text class="step-title" x="184" y="448">inventory starts a peer check</text>
  <text class="step-body" x="184" y="480">Query: ask risk whether anyone never reached PREPARED. Evidence: risk never</text>
  <text class="step-body" x="184" y="502">prepared local work, so ABORT is the only safe outcome.</text>
  <text class="step-footer" x="184" y="532">reserve stock: prepared -&gt; aborted (resolved: yes).</text>
  <circle cx="110" cy="576" r="20" fill="#dc2626" />
  <text class="step-number" x="110" y="576">3</text>
  <rect x="160" y="552" width="992" height="118" rx="22" ry="22" fill="#fef2f2" stroke="#dc2626" stroke-width="2" />
  <text class="step-label" x="184" y="582">Step 3</text>
  <text class="step-title" x="184" y="610">risk acts as an evidence source</text>
  <text class="step-body" x="184" y="642">never reached PREPARED, so this peer can help prove ABORT</text>
  <text class="step-footer" x="184" y="672">fraud screening: aborted -&gt; aborted (resolved: yes).</text>
  <circle cx="110" cy="716" r="20" fill="#dc2626" />
  <text class="step-number" x="110" y="716">4</text>
  <rect x="160" y="692" width="992" height="140" rx="22" ry="22" fill="#fef2f2" stroke="#dc2626" stroke-width="2" />
  <text class="step-label" x="184" y="722">Step 4</text>
  <text class="step-title" x="184" y="750">billing starts a peer check</text>
  <text class="step-body" x="184" y="782">Query: ask risk whether anyone never reached PREPARED. Evidence: risk never</text>
  <text class="step-body" x="184" y="804">prepared local work, so ABORT is the only safe outcome.</text>
  <text class="step-footer" x="184" y="834">capture payment: prepared -&gt; aborted (resolved: yes).</text>
  <circle cx="110" cy="878" r="20" fill="#dc2626" />
  <text class="step-number" x="110" y="878">5</text>
  <rect x="160" y="854" width="992" height="160" rx="22" ry="22" fill="#fef2f2" stroke="#dc2626" stroke-width="2" />
  <text class="step-label" x="184" y="884">Step 5</text>
  <text class="step-title" x="184" y="912">Resolution summary</text>
  <text class="step-body" x="184" y="944">Peer exchange finishes with outcome abort. Final decision: ABORT. Participants</text>
  <text class="step-body" x="184" y="966">still blocked after the exchange: none.</text>
  <text class="step-footer" x="184" y="996">Classic 2PC remains blocking until a PREPARED participant either reaches the</text>
  <text class="step-footer" x="184" y="1016">coordinator or learns an authoritative fact from a peer.</text>
  <text class="takeaway-label" x="48" y="1050">Why this incident still teaches something</text>
  <text class="takeaway-text" x="48" y="1074">• Classic 2PC remains blocking until a PREPARED participant either reaches the coordinator or learns an authoritative fact</text>
  <text class="takeaway-text" x="48" y="1092">from a peer.</text>
  <text class="takeaway-text" x="48" y="1110">• This scenario&#x27;s peer-to-peer termination exchange resolves the blocked participants to `abort` without inventing a brand-new</text>
  <text class="takeaway-text" x="48" y="1128">outcome locally.</text>
  <text class="takeaway-text" x="48" y="1146">• Seeing that risk never reached PREPARED is enough to conclude `ABORT` safely.</text>
</svg>