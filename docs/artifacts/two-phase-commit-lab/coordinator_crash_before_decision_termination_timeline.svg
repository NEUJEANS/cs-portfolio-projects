<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1290" viewBox="0 0 1200 1290" role="img" aria-labelledby="title desc">
  <title id="title">Coordinator crash before durable decision peer termination timeline</title>
  <desc id="desc">Every participant votes YES and enters PREPARED, but the coordinator crashes before it records COMMIT or ABORT. This is the classic blocking case that makes plain 2PC operationally painful.</desc>
  <defs>
    <style>
      .title { font: 700 30px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .subtitle { font: 400 15px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #334155; }
      .summary-label { font: 600 12px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; text-transform: uppercase; letter-spacing: 0.08em; fill: #475569; }
      .summary-value { font: 700 22px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .summary-help { font: 400 12px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .step-label { font: 600 12px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; text-transform: uppercase; letter-spacing: 0.08em; fill: #475569; }
      .step-title { font: 700 20px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .step-body { font: 400 14px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #334155; }
      .step-footer { font: 600 13px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .step-number { font: 700 14px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: white; text-anchor: middle; dominant-baseline: middle; }
      .takeaway-label { font: 700 14px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .takeaway-text { font: 400 13px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #334155; }
    </style>
  </defs>
  <rect width="100%" height="100%" fill="#f8fafc" rx="28" ry="28" />
  <text class="title" x="48" y="54">Coordinator crash before durable decision — peer termination timeline</text>
  <text class="subtitle" x="48" y="84">transaction order-2021 • baseline blocked • peer resolution still-blocked</text>
  <text class="subtitle" x="48" y="110">Every participant votes YES and enters PREPARED, but the coordinator crashes before it records COMMIT or ABORT. This is the classic blocking case that makes plain 2PC operationally painful.</text>
  <rect x="48" y="132" width="344" height="80" rx="18" ry="18" fill="#fff7ed" stroke="#ea580c" stroke-width="2" />
  <text class="summary-label" x="68" y="158">Baseline</text>
  <text class="summary-value" x="68" y="184">BLOCKED</text>
  <text class="summary-help" x="68" y="202">Hint: wait: all prepared peers are still uncertain</text>
  <rect x="404" y="132" width="344" height="80" rx="18" ry="18" fill="#fff7ed" stroke="#ea580c" stroke-width="2" />
  <text class="summary-label" x="424" y="158">Resolved decision</text>
  <text class="summary-value" x="424" y="184">NONE</text>
  <text class="summary-help" x="424" y="202">Outcome: still-blocked</text>
  <rect x="760" y="132" width="344" height="80" rx="18" ry="18" fill="#fff7ed" stroke="#ea580c" stroke-width="2" />
  <text class="summary-label" x="780" y="158">Unresolved after peer exchange</text>
  <text class="summary-value" x="780" y="184">inventory, billing, and shipping</text>
  <text class="summary-help" x="780" y="202">Participants still waiting: 3</text>
  <line x1="110" y1="210" x2="110" y2="966" stroke="#cbd5e1" stroke-width="6" stroke-linecap="round" />
  <circle cx="110" cy="210" r="20" fill="#ea580c" />
  <text class="step-number" x="110" y="210">1</text>
  <rect x="160" y="186" width="992" height="182" rx="22" ry="22" fill="#fff7ed" stroke="#ea580c" stroke-width="2" />
  <text class="step-label" x="184" y="216">Step 1</text>
  <text class="step-title" x="184" y="244">Baseline incident state</text>
  <text class="step-body" x="184" y="276">The baseline 2PC run ends as blocked. Durable decision: NONE. Termination</text>
  <text class="step-body" x="184" y="298">hint: wait: all prepared peers are still uncertain. Unresolved after the plain</text>
  <text class="step-body" x="184" y="320">run: inventory, billing, and shipping.</text>
  <text class="step-footer" x="184" y="350">Peer-assisted termination starts from these exact facts; it never invents a</text>
  <text class="step-footer" x="184" y="370">brand-new global outcome.</text>
  <circle cx="110" cy="414" r="20" fill="#ea580c" />
  <text class="step-number" x="110" y="414">2</text>
  <rect x="160" y="390" width="992" height="162" rx="22" ry="22" fill="#fff7ed" stroke="#ea580c" stroke-width="2" />
  <text class="step-label" x="184" y="420">Step 2</text>
  <text class="step-title" x="184" y="448">inventory starts a peer check</text>
  <text class="step-body" x="184" y="480">Query: ask peers whether anyone knows the final decision or never reached</text>
  <text class="step-body" x="184" y="502">PREPARED. Evidence: every reachable peer is still PREPARED/in doubt, so no</text>
  <text class="step-body" x="184" y="524">safe local conclusion exists yet.</text>
  <text class="step-footer" x="184" y="554">reserve stock: prepared -&gt; prepared (resolved: no).</text>
  <circle cx="110" cy="598" r="20" fill="#ea580c" />
  <text class="step-number" x="110" y="598">3</text>
  <rect x="160" y="574" width="992" height="162" rx="22" ry="22" fill="#fff7ed" stroke="#ea580c" stroke-width="2" />
  <text class="step-label" x="184" y="604">Step 3</text>
  <text class="step-title" x="184" y="632">billing starts a peer check</text>
  <text class="step-body" x="184" y="664">Query: ask peers whether anyone knows the final decision or never reached</text>
  <text class="step-body" x="184" y="686">PREPARED. Evidence: every reachable peer is still PREPARED/in doubt, so no</text>
  <text class="step-body" x="184" y="708">safe local conclusion exists yet.</text>
  <text class="step-footer" x="184" y="738">capture payment: prepared -&gt; prepared (resolved: no).</text>
  <circle cx="110" cy="782" r="20" fill="#ea580c" />
  <text class="step-number" x="110" y="782">4</text>
  <rect x="160" y="758" width="992" height="162" rx="22" ry="22" fill="#fff7ed" stroke="#ea580c" stroke-width="2" />
  <text class="step-label" x="184" y="788">Step 4</text>
  <text class="step-title" x="184" y="816">shipping starts a peer check</text>
  <text class="step-body" x="184" y="848">Query: ask peers whether anyone knows the final decision or never reached</text>
  <text class="step-body" x="184" y="870">PREPARED. Evidence: every reachable peer is still PREPARED/in doubt, so no</text>
  <text class="step-body" x="184" y="892">safe local conclusion exists yet.</text>
  <text class="step-footer" x="184" y="922">create shipment: prepared -&gt; prepared (resolved: no).</text>
  <circle cx="110" cy="966" r="20" fill="#ea580c" />
  <text class="step-number" x="110" y="966">5</text>
  <rect x="160" y="942" width="992" height="182" rx="22" ry="22" fill="#fff7ed" stroke="#ea580c" stroke-width="2" />
  <text class="step-label" x="184" y="972">Step 5</text>
  <text class="step-title" x="184" y="1000">Resolution summary</text>
  <text class="step-body" x="184" y="1032">Peer exchange finishes with outcome still-blocked. Final decision: NONE.</text>
  <text class="step-body" x="184" y="1054">Participants still blocked after the exchange: inventory, billing, and</text>
  <text class="step-body" x="184" y="1076">shipping.</text>
  <text class="step-footer" x="184" y="1106">Classic 2PC remains blocking until a PREPARED participant either reaches the</text>
  <text class="step-footer" x="184" y="1126">coordinator or learns an authoritative fact from a peer.</text>
  <text class="takeaway-label" x="48" y="1160">Why this incident still teaches something</text>
  <text class="takeaway-text" x="48" y="1184">• Classic 2PC remains blocking until a PREPARED participant either reaches the coordinator or learns an authoritative fact</text>
  <text class="takeaway-text" x="48" y="1202">from a peer.</text>
  <text class="takeaway-text" x="48" y="1220">• The peer check still cannot finish the protocol here because every reachable peer is just as uncertain as the blocked</text>
  <text class="takeaway-text" x="48" y="1238">participant.</text>
  <text class="takeaway-text" x="48" y="1256">• When no peer knows COMMIT/ABORT and no peer can prove a missing PREPARED record, plain 2PC stays blocked until coordinator</text>
  <text class="takeaway-text" x="48" y="1274">recovery.</text>
</svg>