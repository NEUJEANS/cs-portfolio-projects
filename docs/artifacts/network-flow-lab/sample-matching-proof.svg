ill="#ffffff" stroke="#dbe4ee" /><text x="48.0" y="430.0" font-size="18" font-weight="700" fill="#111827" font-family='ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif'>Why the certificate works</text><text x="48.0" y="462.0" font-size="16" font-weight="700" fill="#059669" font-family='ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif'>•</text><text x="64.0" y="462.0" font-size="13" font-weight="normal" fill="#334155" font-family='ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif'>The matching contains 3 edge(s), and the</text><text x="64.0" y="480.0" font-size="13" font-weight="normal" fill="#334155" font-family='ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif'>recovered minimum vertex cover contains 3</text><text x="64.0" y="498.0" font-size="13" font-weight="normal" fill="#334155" font-family='ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif'>vertex/vertices.</text><text x="48.0" y="524.0" font-size="16" font-weight="700" fill="#059669" font-family='ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif'>•</text><text x="64.0" y="524.0" font-size="13" font-weight="normal" fill="#334155" font-family='ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif'>Unmatched left vertices seed alternating-path</text><text x="64.0" y="542.0" font-size="13" font-weight="normal" fill="#334155" font-family='ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif'>reachability; left vertices not reached and</text><text x="64.0" y="560.0" font-size="13" font-weight="normal" fill="#334155" font-family='ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif'>right vertices that are reached form the</text><text x="64.0" y="578.0" font-size="13" font-weight="normal" fill="#334155" font-family='ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif'>minimum cover.</text><text x="48.0" y="604.0" font-size="16" font-weight="700" fill="#059669" font-family='ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif'>•</text><text x="64.0" y="604.0" font-size="13" font-weight="normal" fill="#334155" font-family='ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif'>König's theorem check is satisfied, so the</text><text x="64.0" y="622.0" font-size="13" font-weight="normal" fill="#334155" font-family='ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif'>cover size matches the matching size.</text><rect x="480" y="398" width="452" height="208" rx="18" fill="#ffffff" stroke="#dbe4ee" /><text x="500.0" y="430.0" font-size="18" font-weight="700" fill="#111827" font-family='ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif'>Certificate summary</text><text x="500.0" y="462.0" font-size="13" font-weight="normal" fill="#334155" font-family='ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif'>match count = 3</text><text x="500.0" y="486.0" font-size="13" font-weight="normal" fill="#334155" font-family='ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif'>minimum vertex cover size = 3</text><text x="500.0" y="510.0" font-size="13" font-weight="normal" fill="#334155" font-family='ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif'>König theorem satisfied = True</text><text x="500.0" y="534.0" font-size="13" font-weight="normal" fill="#334155" font-family='ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif'>flow max value used by reduction = 3</text><text x="500.0" y="570.0" font-size="12" font-weight="normal" fill="#64748b" font-family='ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif'>This card is meant to pair with the Markdown proof artifact for portfolio screenshots.</text><text x="28.0" y="628.0" font-size="12" font-weight="normal" fill="#475569" font-family='ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif'>König check ties the matching size (3) to the recovered cover size (3).</text></svg>
