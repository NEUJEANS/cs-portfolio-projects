<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Deadlock wait-for graph report</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background: #f8fafc; color: #0f172a; }
    main { max-width: 1080px; margin: 0 auto; padding: 32px 24px 48px; }
    .card { background: #fff; border: 1px solid #cbd5e1; border-radius: 18px; padding: 20px; margin-top: 20px; box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06); }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; }
    .metric { background: #eff6ff; border-radius: 14px; padding: 14px; }
    table { width: 100%; border-collapse: collapse; margin-top: 12px; }
    th, td { border-bottom: 1px solid #e2e8f0; padding: 10px 8px; text-align: left; }
    th { font-size: 13px; color: #475569; text-transform: uppercase; letter-spacing: 0.04em; }
    .danger { color: #b91c1c; font-weight: 700; }
  </style>
</head>
<body>
  <main>
    <h1>Deadlock wait-for graph report</h1>
    <p>Source: <code>projects/deadlock-detector-lab/sample_wait_graph.json</code></p>
    <section class="grid">
      <div class="metric"><strong>Deadlocked</strong><br />yes</div>
      <div class="metric"><strong>Cycle</strong><br />P1 → P2 → P3 → P1</div>
      <div class="metric"><strong>Blocked processes</strong><br />P1, P2, P3</div>
    </section>
    <section class="card"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 560" role="img" aria-labelledby="wait-projects-deadlock-detector-lab-sample-wait-graph-json-title wait-projects-deadlock-detector-lab-sample-wait-graph-json-desc">
  <title id="wait-projects-deadlock-detector-lab-sample-wait-graph-json-title">Wait-for graph visualization for projects/deadlock-detector-lab/sample_wait_graph.json</title>
  <desc id="wait-projects-deadlock-detector-lab-sample-wait-graph-json-desc">Processes arranged in a ring, with deadlocked cycle edges highlighted in red.</desc>
  <style>
    .bg { fill: #f8fafc; }
    .card { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; }
    .label { fill: #0f172a; font-family: Arial, sans-serif; font-size: 15px; }
    .muted { fill: #475569; font-family: Arial, sans-serif; font-size: 13px; }
    .tiny { fill: #475569; font-family: Arial, sans-serif; font-size: 12px; }
  </style>
  <defs>
    <marker id="arrow-slate" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569" />
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb" />
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#dc2626" />
    </marker>
    <marker id="arrow-amber" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#d97706" />
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="760" height="560" rx="24" />
  <rect class="card" x="24" y="24" width="712" height="512" rx="20" />
<text x="52.0" y="58.0" text-anchor="start" class="label">Deadlock wait-for graph</text>
<text x="52.0" y="82.0" text-anchor="start" class="muted">Source: projects/deadlock-detector-lab/sample_wait_graph.json</text>
<text x="708.0" y="58.0" text-anchor="end" class="muted">cycle highlighted</text>
  <line x1="401.2" y1="165.2" x2="494.8" y2="258.8" stroke="#dc2626" stroke-width="3" marker-end="url(#arrow-red)" />
  <line x1="494.8" y1="301.2" x2="401.2" y2="394.8" stroke="#dc2626" stroke-width="3" marker-end="url(#arrow-red)" />
  <line x1="380.0" y1="386.0" x2="380.0" y2="174.0" stroke="#dc2626" stroke-width="3" marker-end="url(#arrow-red)" />
  <line x1="274.0" y1="280.0" x2="486.0" y2="280.0" stroke="#475569" stroke-width="2" marker-end="url(#arrow-slate)" />
  <circle cx="380.0" cy="144.0" r="30.0" fill="#fee2e2" stroke="#b91c1c" stroke-width="2.5" />
<text x="380.0" y="149.0" text-anchor="middle" class="label">P1</text>
  <circle cx="516.0" cy="280.0" r="30.0" fill="#fee2e2" stroke="#b91c1c" stroke-width="2.5" />
<text x="516.0" y="285.0" text-anchor="middle" class="label">P2</text>
  <circle cx="380.0" cy="416.0" r="30.0" fill="#fee2e2" stroke="#b91c1c" stroke-width="2.5" />
<text x="380.0" y="421.0" text-anchor="middle" class="label">P3</text>
  <circle cx="244.0" cy="280.0" r="30.0" fill="#dbeafe" stroke="#1d4ed8" stroke-width="2.5" />
<text x="244.0" y="285.0" text-anchor="middle" class="label">P4</text>
  <rect x="52" y="472.0" width="18" height="18" rx="5" fill="#fee2e2" stroke="#b91c1c" stroke-width="2" />
<text x="80.0" y="486.0" text-anchor="start" class="tiny">blocked process</text>
  <line x1="220" y1="481.0" x2="254" y2="481.0" stroke="#dc2626" stroke-width="3" marker-end="url(#arrow-red)" />
<text x="264.0" y="486.0" text-anchor="start" class="tiny">cycle edge</text>
  <line x1="360" y1="481.0" x2="394" y2="481.0" stroke="#475569" stroke-width="2" marker-end="url(#arrow-slate)" />
<text x="404.0" y="486.0" text-anchor="start" class="tiny">waiting edge</text>
</svg></section>
    <section class="card">
      <h2>Wait edges</h2>
      <table>
        <thead><tr><th>From</th><th>To</th><th>Status</th></tr></thead>
        <tbody><tr><td>P1</td><td>P2</td><td>cycle</td></tr>
<tr><td>P2</td><td>P3</td><td>cycle</td></tr>
<tr><td>P3</td><td>P1</td><td>cycle</td></tr>
<tr><td>P4</td><td>P2</td><td>waiting</td></tr></tbody>
      </table>
    </section>
  </main>
</body>
</html>
