<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Deadlock allocation report</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background: #f8fafc; color: #0f172a; }
    main { max-width: 1160px; margin: 0 auto; padding: 32px 24px 48px; }
    .card { background: #fff; border: 1px solid #cbd5e1; border-radius: 18px; padding: 20px; margin-top: 20px; box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06); }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; }
    .metric { background: #eff6ff; border-radius: 14px; padding: 14px; }
    .tables { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
    table { width: 100%; border-collapse: collapse; margin-top: 12px; }
    th, td { border-bottom: 1px solid #e2e8f0; padding: 10px 8px; text-align: left; vertical-align: top; }
    th { font-size: 13px; color: #475569; text-transform: uppercase; letter-spacing: 0.04em; }
  </style>
</head>
<body>
  <main>
    <h1>Deadlock allocation report</h1>
    <p>Source: <code>projects/deadlock-detector-lab/sample_allocation_state.json</code></p>
    <section class="grid">
      <div class="metric"><strong>Deadlocked</strong><br />yes</div>
      <div class="metric"><strong>Finish order</strong><br />P3</div>
      <div class="metric"><strong>Deadlocked processes</strong><br />P1, P2</div>

    .muted { fill: #475569; font-family: Arial, sans-serif; font-size: 13px; }
    .tiny { fill: #475569; font-family: Arial, sans-serif; font-size: 12px; }
  </style>
  <defs>

    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb" />
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#dc2626" />
    </marker>
    <marker id="arrow-amber" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#d97706" />
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="980" height="520" rx="24" />
  <rect class="card" x="24" y="24" width="932" height="472" rx="20" />
<text x="52.0" y="58.0" text-anchor="start" class="label">Deadlock resource-allocation view</text>
<text x="52.0" y="82.0" text-anchor="start" class="muted">Source: projects/deadlock-detector-lab/sample_allocation_state.json</text>

<text x="220.0" y="112.0" text-anchor="middle" class="muted">Processes</text>
<text x="760.0" y="112.0" text-anchor="middle" class="muted">Resources</text>
  <line x1="726.0" y1="150.0" x2="278.0" y2="150.0" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrow-blue)" />
<text x="500.0" y="142.0" text-anchor="middle" class="tiny">held 1</text>
  <line x1="726.0" y1="246.0" x2="278.0" y2="246.0" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrow-blue)" />
<text x="500.0" y="238.0" text-anchor="middle" class="tiny">held 1</text>

<text x="482.0" y="186.0" text-anchor="middle" class="tiny">needs 1 (short 1)</text>
  <rect x="162.0" y="126.0" width="116" height="48" rx="16" fill="#fee2e2" stroke="#b91c1c" stroke-width="2.5" />
<text x="220.0" y="155.0" text-anchor="middle" class="label">P1</text>

</body>
</html>
