<svg xmlns="http://www.w3.org/2000/svg" width="1108" height="498" viewBox="0 0 1108 498" role="img" aria-labelledby="timeline-title timeline-desc">
<title id="timeline-title">Repeatable read window timeline</title>
<desc id="timeline-desc">A long-running reader observes a value twice while a concurrent writer increments it in the middle of the schedule.</desc>
<style>text { font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #0f172a; }.title { font-size: 24px; font-weight: 700; }.subtitle { font-size: 13px; fill: #475569; }.lane-label { font-size: 13px; font-weight: 600; }.tick-label { font-size: 12px; fill: #64748b; }.event-text { font-size: 10.5px; font-weight: 600; }.summary-text { font-size: 12px; fill: #334155; }.grid { stroke: #e2e8f0; stroke-width: 1; }.lane { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1; }.connector { fill: none; stroke: #94a3b8; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }.event-card { stroke: #475569; stroke-width: 1; }.version-band { fill: #eff6ff; stroke: #93c5fd; stroke-width: 1; }</style>
<text x="24" y="36" class="title">Repeatable read window</text>
<text x="24" y="58" class="subtitle">Isolation: read-committed · ticks: 5 · final version: 1</text>
