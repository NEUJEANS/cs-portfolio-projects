  <rect width="1200" height="810" fill="#f8fafc" rx="28" /><rect x="24" y="24" width="1152" height="184" rx="24" fill="#ffffff" stroke="#dbe3ef" /><text x="52" y="58" class="eyebrow"><tspan x="52" dy="0">Graph routing diff snapshot</tspan></text><text x="52" y="94" class="headline"><tspan x="52" dy="0">routing_demo vs link_failure_demo</tspan></text><text x="52" y="126" class="lede"><tspan x="52" dy="0">Source A; baseline negative cycle none; candidate negative cycle none.</tspan></text><text x="52" y="168" class="meta"><tspan x="52" dy="0">Edge changes: 4</tspan><tspan x="52" dy="18">Changed routes: 3</tspan><tspan x="52" dy="18">Unchanged routes: 1</tspan></text><rect x="774" y="48" width="364" height="136" rx="20" fill="#eff6ff" stroke="#bfdbfe" /><text x="798" y="78" class="sectionLabel"><tspan x="798" dy="0">Edge preview</tspan></text><text x="798" y="108" class="smallMono"><tspan x="798" dy="0">A→B: 4→2</tspan><tspan x="798" dy="18">A→C: 2→4</tspan><tspan x="798" dy="18">B→D: 2→absent</tspan><tspan x="798" dy="18">+1 more edge changes</tspan></text><rect x="44" y="224" width="204" height="112" rx="20" fill="#ffffff" stroke="#dbe3ef" /><text x="62" y="258" class="cardLabel"><tspan x="62" dy="0">Changed edges</tspan></text><text x="62" y="296" class="cardValue"><tspan x="62" dy="0">4</tspan></text><text x="62" y="318" class="cardNote"><tspan x="62" dy="0">edge-weight or</tspan><tspan x="62" dy="15">edge-presence…</tspan></text><rect x="262" y="224" width="204" height="112" rx="20" fill="#ffffff" stroke="#dbe3ef" /><text x="280" y="258" class="cardLabel"><tspan x="280" dy="0">Changed routes</tspan></text><text x="280" y="296" class="cardValue"><tspan x="280" dy="0">3</tspan></text><text x="280" y="318" class="cardNote"><tspan x="280" dy="0">route-table entries that</tspan><tspan x="280" dy="15">changed</tspan></text><rect x="480" y="224" width="204" height="112" rx="20" fill="#ffffff" stroke="#dbe3ef" /><text x="498" y="258" class="cardLabel"><tspan x="498" dy="0