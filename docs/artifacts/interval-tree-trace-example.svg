<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 520" width="980" height="520" role="img" aria-labelledby="title desc">
  <title id="title">Interval tree overlap trace example</title>
  <desc id="desc">An interval tree query trace showing visited, overlapping, and pruned branches for query [7,18].</desc>
  <style>
    .bg { fill: #f8fafc; }
    .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; }
    .query { fill: #eef2ff; stroke: #6366f1; stroke-width: 2; }
    .node { fill: #f8fafc; stroke: #334155; stroke-width: 1.5; }
    .hit { fill: #dcfce7; stroke: #16a34a; stroke-width: 2; }
    .pruned { fill: #f1f5f9; stroke: #94a3b8; stroke-width: 1.5; stroke-dasharray: 8 6; }
    .edge { stroke: #2563eb; stroke-width: 2; fill: none; }
    .edge-pruned { stroke: #94a3b8; stroke-width: 2; fill: none; stroke-dasharray: 8 6; }
    .label { font: 14px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
    .small { font-size: 12px; fill: #475569; }
    .mono { font-family: "SFMono-Regular", ui-monospace, Consolas, monospace; font-size: 13px; }
  </style>
  <rect class="bg" x="0" y="0" width="980" height="520" rx="16" />
  <rect class="panel" x="20" y="20" width="940" height="480" rx="18" />

  <rect class="query" x="390" y="34" width="200" height="54" rx="12" />
  <text class="label" x="490" y="58" text-anchor="middle">query</text>
  <text class="label mono" x="490" y="78" text-anchor="middle">[7,18]</text>

  <path class="edge" d="M490 88 L490 124" />

  <rect class="hit" x="390" y="124" width="200" height="62" rx="12" />
  <text class="label mono" x="490" y="150" text-anchor="middle">[6,10] deploy</text>
  <text class="small mono" x="490" y="171" text-anchor="middle">max_end=23</text>

  <path class="edge" d="M450 186 L315 244" />
  <path class="edge" d="M530 186 L665 244" />

  <rect class="hit" x="220" y="244" width="190" height="62" rx="12" />
  <text class="label mono" x="315" y="270" text-anchor="middle">[5,8] backup</text>
  <text class="small mono" x="315" y="291" text-anchor="middle">max_end=8</text>

  <rect class="hit" x="570" y="244" width="190" height="62" rx="12" />
  <text class="label mono" x="665" y="270" text-anchor="middle">[17,19] alerts</text>
  <text class="small mono" x="665" y="291" text-anchor="middle">max_end=23</text>

  <path class="edge-pruned" d="M275 306 L185 372" />
  <path class="edge-pruned" d="M625 306 L535 372" />
  <path class="edge" d="M705 306 L795 372" />

  <rect class="pruned" x="100" y="372" width="170" height="62" rx="12" />
  <text class="label mono" x="185" y="398" text-anchor="middle">[0,3] warmup</text>
  <text class="small" x="185" y="419" text-anchor="middle">pruned: left.max_end &lt; 7</text>

  <rect class="pruned" x="450" y="372" width="170" height="62" rx="12" />
  <text class="label mono" x="535" y="398" text-anchor="middle">∅ left child</text>
  <text class="small" x="535" y="419" text-anchor="middle">no subtree to search</text>

  <rect class="hit" x="710" y="372" width="170" height="62" rx="12" />
  <text class="label mono" x="795" y="398" text-anchor="middle">[15,23] analytics</text>
  <text class="small mono" x="795" y="419" text-anchor="middle">max_end=23</text>

  <text class="small" x="65" y="472">Green nodes overlap the query. Dashed branches are pruned because interval-tree metadata proves they cannot contain hits.</text>
</svg>
